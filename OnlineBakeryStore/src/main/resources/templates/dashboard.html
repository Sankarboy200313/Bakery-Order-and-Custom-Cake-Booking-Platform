<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- Navigation bar with dynamic login/profile button -->
<nav>
    <input type="checkbox" id="res-menu">
    <label for="res-menu">
        <i class="fas fa-bars" id="s1"></i>
        <i class="fas fa-times" id="s2"></i>
    </label>
    <h2>Your Online</h2>
    <h1>Bakery Store</h1>
    <ul>
        <li><a th:href="@{/dashboard}">Home</a></li>
        <li><a th:href="@{/order}">Order</a></li>
        <li><a th:href="@{/aboutUs}">About Us</a></li>
        <li><a th:href="@{/service}">Services</a></li>
        <li th:if="${isLoggedIn and isAdmin}"><a th:href="@{/admin-dashboard}">Admin</a></li>
        <li th:if="${!isLoggedIn}" class="nav-button"><a href="/login">Login</a></li>
        <li th:if="${isLoggedIn}" class="nav-button"><a href="/profile">Profile</a></li>
    </ul>
</nav>
<hr>
<hr>
<div class="banner-area">
    <div class="banner-text">
        <h2>Welcome</h2>
        <h1>To Our Bakery Store</h1>
        <p>Handmade with Passion & Delivered with Care</p>
    </div>
</div>
</body>
</html>
