<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
</head>
</head>
<body>
<!-- Navigation header and list -->
<nav>
    <input type="checkbox" id="res-menu">
    <label for="res-menu">
        <i class="fas fa-bars" id="s1"></i>
        <i class="fas fa-times" id="s2"></i>
    </label>
    <h2>Your Online</h2>
    <h1>Bakery Store</h1>
    <ul>
        <li><a th:href="@{/dashboard}">Home</a></li>
        <li><a th:href="@{/order}">Order</a></li>
        <li><a th:href="@{/chart}">Chart</a></li>
        <li><a th:href="@{/aboutUs}">About Us</a></li>
        <li><a th:href="@{/service}">Services</a></li>
        <li><a th:if="${isLoggedIn and isAdmin}" href="/admin-dashboard">User Details</a></li>
        <li th:if="${!isLoggedIn}" class="nav-button"><a href="/login">Login</a></li>
        <li th:if="${isLoggedIn}" class="nav-button"><a href="/profile">Profile</a></li>
    </ul>
</nav>
<hr>

<div class="dashboard-content">
    <h2>Admin Dashboard</h2>
    <h3>All Users</h3>
    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>
    <table>
        <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Full Name</th>
            <th>Telephone</th>
            <th>Admin</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${users == null or #lists.isEmpty(users)}">
            <td colspan="6">No users found or data unavailable.</td>
        </tr>
        <tr th:each="user : ${users}" th:unless="${users == null}">
            <td th:text="${user.username} ?: 'N/A'"></td>
            <td th:text="${user.email} ?: 'N/A'"></td>
            <td th:text="${user.fullname} ?: 'N/A'"></td>
            <td th:text="${user.telephoneNo} ?: 'N/A'"></td>
            <td th:text="${user.isAdmin() ? 'Yes' : 'No'}"></td>
            <td>
                <a th:href="@{/admin/edit-user(username=${user.username})}" th:text="'Edit'"></a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
