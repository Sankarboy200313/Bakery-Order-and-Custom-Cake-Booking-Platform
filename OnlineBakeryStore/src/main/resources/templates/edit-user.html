<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<nav>
    <input type="checkbox" id="res-menu">
    <label for="res-menu">
        <i class="fas fa-bars" id="s1"></i>
        <i class="fas fa-times" id="s2"></i>
    </label>
    <h2>Your Online</h2>
    <h1>Bakery Store</h1>
    <ul>
        <li><a th:href="@{/dashboard}">Home</a></li>
        <li><a th:href="@{/order}">Order</a></li>
        <li><a th:href="@{/aboutUs}">About Us</a></li>
        <li><a th:href="@{/service}">Services</a></li>
        <li><a th:if="${isLoggedIn and isAdmin}" href="/admin-dashboard">User Details</a></li>
        <li th:if="${!isLoggedIn}" class="nav-button"><a href="/login">Login</a></li>
        <li th:if="${isLoggedIn}" class="nav-button"><a href="/profile">Profile</a></li>
    </ul>
</nav>
<hr>
<div class="form-container">
    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/admin/update-user}" method="post">
        <h2>Edit User</h2>
        <input type="hidden" name="oldUsername" th:value="${user.username}"/>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" th:value="${user.username}" required/>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" th:value="${user.email}" required/>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" th:value="${user.password}" required/>
        </div>

        <div class="form-group">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" th:value="${user.fullname}"/>
        </div>

        <div class="form-group">
            <label for="telephoneNo">Telephone:</label>
            <input type="text" id="telephoneNo" name="telephoneNo" th:value="${user.telephoneNo}"/>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="isAdmin" name="isAdmin" th:checked="${user.isAdmin()}" value="true"/>
            <label for="isAdmin">Is Admin</label>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-submit">Update User</button>
        </div>
        <a href="/admin-dashboard" class="back-link">&#8592; Back to Admin Dashboard</a>
    </form>
</div>
</body>
</html>
