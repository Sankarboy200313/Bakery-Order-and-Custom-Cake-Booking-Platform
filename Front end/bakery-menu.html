<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bakery Menu</title>
  <link rel="stylesheet" href="bakery.css" />
</head>
<body>
  <!-- Background Decorations -->
  <div class="cake-background-left"></div>
  <div class="cake-background"></div>

  <div class="menu-container">
    <h1>Bakery Menu</h1>
    
    <div class="menu-grid">
      <!-- Bakery Item 1 -->
      <div class="Egg Puff">
        <img src="Egg-Puff-Pastry-Bundle-Featured-Image-.jpg" alt="Croissant" />
        <h3>Croissant</h3>
        <p>₹40</p>
        <input type="number" min="0" placeholder="Qty" />
      </div>

      <!-- Bakery Item 2 -->
      <div class="Chicken Sandwich">
        <img src="merlin_189026502_58171dd4-b0bc-47c3-aa6a-d910a3f1de4c-mediumSquareAt3X.jpg" alt="Donut" />
        <h3>Donut</h3>
        <p>₹35</p>
        <input type="number" min="0" placeholder="Qty" />
      </div>

      <!-- Bakery Item 3 -->
      <div class="Chocolate Donut">
        <img src="chocolate-donuts-featured.jpg" alt="Muffin" />
        <h3>Chocolate Muffin</h3>
        <p>₹50</p>
        <input type="number" min="0" placeholder="Qty" />
      </div>

      <!-- Bakery Item 4 -->
      <div class="menu-item">
        <img src="images/bread.jpg" alt="Bread" />
        <h3>Fresh Bread</h3>
        <p>₹30</p>
        <input type="number" min="0" placeholder="Qty" />
      </div>
    </div>

    <div class="menu-buttons">
      <button onclick="location.href='index.html'">Custom Cake Order</button>
      <button onclick="location.href='payment.html'">Add Payment</button>
      <button onclick="location.href='index.html'">Exit</button>
    </div>
  </div>
</body>
</html>
