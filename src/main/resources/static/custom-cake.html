<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Custom Cake Ordering</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Decorative Cake Background Image -->
    <div class="cake-background"></div>

    <div class="container">
        <h1>Order Your Custom Cake</h1>
        <form id="cakeForm" method="post" action="">
            <label for="flavor">Choose Cake Flavor:</label>
            <select id="flavor" required onchange="updatePrice()">
                <option value="">Select</option>
                <option value="Vanilla">Vanilla</option>
                <option value="Chocolate">Chocolate</option>
                <option value="Strawberry">Strawberry</option>
            </select>

            <label for="shape">Choose Cake Shape:</label>
            <select id="shape" required onchange="updatePrice()">
                <option value="">Select</option>
                <option value="Round">Round</option>
                <option value="Square">Square</option>
                <option value="Heart">Heart</option>
            </select>

            <fieldset>
                <legend>Select Toppings:</legend>
                <div class="topping-option">
                    <input type="checkbox" id="cherry" name="toppings" value="Cherry" onchange="updatePrice()">
                    <label for="cherry">Cherry (+Rs.300)</label>
                </div>
                <div class="topping-option">
                    <input type="checkbox" id="nuts" name="toppings" value="Nuts" onchange="updatePrice()">
                    <label for="nuts">Nuts (+Rs.150)</label>
                </div>
                <div class="topping-option">
                    <input type="checkbox" id="cashews" name="toppings" value="Cashews" onchange="updatePrice()">
                    <label for="cashews">Cashews (+Rs.350)</label>
                </div>
            </fieldset>

            <div id="priceDisplay" style="margin: 15px 0; font-weight: bold; color: #3E2723; background: #fffbe7; border-radius: 8px; padding: 10px;">
                Total Price: Rs.<span id="totalPrice">2000</span>
            </div>

            <label for="message">Enter Custom Message:</label>
            <input type="text" id="message" placeholder="Happy Birthday!" required>

            <!-- Buttons Section -->
            <button type="submit">Place Order</button>
            <button type="button" onclick="exitApp()">Exit</button>
        </form>
    </div>

    <div class="cake-background-left"></div>
    <div class="cake-background"></div>

    <!-- JS to handle form submission -->
    <script>
        function exitApp() {
            alert("Exiting the application...");
            window.location.href = "https://www.google.com";
        }

        function calculateTotal() {
            const basePrice = 2000;
            let total = basePrice;
            const toppingCheckboxes = document.querySelectorAll('input[name="toppings"]:checked');
            toppingCheckboxes.forEach(cb => {
                if (cb.value === 'Cherry') total += 300;
                if (cb.value === 'Nuts') total += 150;
                if (cb.value === 'Cashews') total += 350;
            });
            return total;
        }

        function updatePrice() {
            const total = calculateTotal();
            document.getElementById('totalPrice').textContent = total;
        }

        // Initialize price display
        updatePrice();

        document.getElementById('cakeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const flavor = document.getElementById('flavor').value;
            const shape = document.getElementById('shape').value;
            const message = document.getElementById('message').value;
            const toppingCheckboxes = document.querySelectorAll('input[name="toppings"]:checked');
            const toppings = Array.from(toppingCheckboxes).map(cb => cb.value).join(', ');

            const totalAmount = calculateTotal();

            // Create the order object
            const order = {
                flavor: flavor,
                shape: shape,
                toppings: toppings,
                message: message,
                totalAmount: totalAmount
            };

            // Send the order to the backend
            fetch('http://localhost:8080/api/custom-cakes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(order)
            })
            .then(response => response.json())
            .then(data => {
                // Get selected products from localStorage
                let selectedProducts = [];
                try {
                    selectedProducts = JSON.parse(localStorage.getItem('selectedProducts')) || [];
                } catch (e) { selectedProducts = []; }
                // Redirect to summary page with all order details and selected products in the URL
                const orderDetails = encodeURIComponent(JSON.stringify({
                    id: data.id,
                    flavor: data.flavor,
                    shape: data.shape,
                    toppings: data.toppings,
                    message: data.message,
                    totalAmount: data.totalAmount,
                    products: selectedProducts
                }));
                window.location.href = `summary.html?order=${orderDetails}`;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('There was an error placing your order. Please try again.');
            });
        });
    </script>
</body>
</html>
