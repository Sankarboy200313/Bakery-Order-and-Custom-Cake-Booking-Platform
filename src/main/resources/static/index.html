<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bakery Products</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="background-overlay"></div>
    
    <header>
        <h1>SLIIT Bakery</h1>
        <nav>
            <ul>
                <li class="active">Products</li>
                <li onclick="window.location.href='custom-cake.html'">Custom Cake</li>
                <li onclick="window.location.href='orders.html'">Orders</li>
            </ul>
        </nav>
    </header>

    <main class="product-section" id="productList">
        <!-- Products will be loaded here dynamically -->
    </main>

    <div class="custom-order-section">
        <a href="custom-cake.html" class="custom-order-button" onclick="saveProductSelections()">Custom Cake Order</a>
    </div>

    <footer>
        <p>Designed by PG - 117 © 2025 SLIIT Bakery</p>
    </footer>

    <script>
        // Load products from JSON file
        fetch('http://localhost:8080/api/products')
            .then(response => response.json())
            .then(products => {
                const productList = document.getElementById('productList');
                products.forEach(product => {
                    const productCard = `
                        <div class="product-card">
                            <img src="${product.imageUrl}" alt="${product.name}"/>
                            <h2>${product.name}</h2>
                            <p>${product.description}</p>
                            <div class="stars">${'★'.repeat(product.rating)}${'☆'.repeat(5-product.rating)}</div>
                            <div class="price">Rs.${product.price}</div>
                            <button onclick="addToCart('${product.id}')">Add</button>
                            <input type="number" min="0" placeholder="Qty" class="quantity-box" />
                        </div>
                    `;
                    productList.innerHTML += productCard;
                });
            })
            .catch(error => console.error('Error loading products:', error));

        function addToCart(productId) {
            // Implement cart functionality here
            alert('Product added to cart!');
        }

        // Save selected product quantities to localStorage
        function saveProductSelections() {
            const productCards = document.querySelectorAll('.product-card');
            const selectedProducts = [];
            productCards.forEach(card => {
                const name = card.querySelector('h2').textContent.trim();
                const price = parseInt(card.querySelector('.price').textContent.replace('Rs.', '').trim());
                const qtyInput = card.querySelector('.quantity-box');
                const quantity = parseInt(qtyInput.value);
                if (quantity && quantity > 0) {
                    selectedProducts.push({ name, price, quantity });
                }
            });
            localStorage.setItem('selectedProducts', JSON.stringify(selectedProducts));
        }
    </script>
</body>
</html>
