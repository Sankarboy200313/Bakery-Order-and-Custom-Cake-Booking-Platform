<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary - SLIIT Bakery</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .summary-container {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            width: 400px;
            height: 533px; /* 4:3 aspect ratio (vertical:horizontal) */
            max-width: 90vw;
            max-height: 90vh;
            background: linear-gradient(to bottom right, rgba(169, 116, 110, 0.88), rgba(78, 52, 46, 0.88));
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
            color: #fff;
            text-align: center;
            display: flex;
            flex-direction: column;
            font-family: 'Open Sans', sans-serif;
        }

        .summary-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: bold;
            color: #f1c27d;
            text-align: center;
            margin-bottom: 10px;
        }

        .summary-box {
            background-color: rgba(139, 69, 19, 0.08);
            padding: 2.2rem 2.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 0.01em;
            overflow-y: auto;
            max-height: 340px;
        }

        .summary-box p {
            margin: 1rem 0;
            font-size: 1rem;
            color: #fff;
            font-family: 'Open Sans', sans-serif;
        }

        .summary-box .total {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2D1B0E;
            border-top: 2px solid rgba(139, 69, 19, 0.18);
            padding-top: 1.1rem;
            margin-top: 1.1rem;
            font-family: 'Montserrat', sans-serif;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .button-group button {
            flex: 1;
        }

        .summary-box, .summary-box *, .breakdown, .breakdown * {
            font-family: 'Open Sans', Arial, sans-serif !important;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <header>
        <h1>SLIIT Bakery</h1>
        <nav>
            <ul>
                <li onclick="window.location.href='index.html'">Products</li>
                <li onclick="window.location.href='custom-cake.html'">Custom Cake</li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="summary-container">
            <h2>Order Summary</h2>
            <div class="summary-box" id="summaryBox">
                <p><strong>Order ID:</strong> <span id="orderId"></span></p>
                <p><strong>Cake Flavor:</strong> <span id="flavor"></span></p>
                <p><strong>Shape:</strong> <span id="shape"></span></p>
                <p><strong>Toppings:</strong> <span id="toppings"></span></p>
                <p><strong>Message:</strong> <span id="message"></span></p>
                <div id="breakdown" class="breakdown" style="margin-top:18px;text-align:left;"></div>
                <p class="total"><strong>Total Amount:</strong> Rs.<span id="totalAmount"></span></p>
            </div>
            <div class="button-group">
                <button onclick="window.location.href='custom-cake.html'">Place Another Order</button>
                <button onclick="window.location.href='payment.html'">Add Payment</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get order details from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const orderParam = urlParams.get('order');
            if (orderParam) {
                try {
                    const order = JSON.parse(decodeURIComponent(orderParam));
                    document.getElementById('orderId').textContent = order.id;
                    document.getElementById('flavor').textContent = order.flavor;
                    document.getElementById('shape').textContent = order.shape;
                    document.getElementById('toppings').textContent = order.toppings;
                    document.getElementById('message').textContent = order.message;
                    document.getElementById('totalAmount').textContent = order.totalAmount || '';

                    // Price breakdown for custom cake
                    let breakdownHtml = '<div style="font-weight:600; margin-bottom:4px;">Price breakdown:</div><ul style="margin:10px 0 0 0; padding:0 0 0 18px;">';
                    breakdownHtml += `<li>Base Cake Price: Rs.2000</li>`;
                    if (order.toppings) {
                        const toppingsArr = order.toppings.split(',').map(t => t.trim()).filter(Boolean);
                        toppingsArr.forEach(topping => {
                            if (topping === 'Cherry') breakdownHtml += '<li>Cherry: Rs.300</li>';
                            if (topping === 'Nuts') breakdownHtml += '<li>Nuts: Rs.150</li>';
                            if (topping === 'Cashews') breakdownHtml += '<li>Cashews: Rs.350</li>';
                        });
                    }
                    breakdownHtml += '</ul>';

                    // Price breakdown for products
                    let productsTotal = 0;
                    if (order.products && order.products.length > 0) {
                        breakdownHtml += '<div style="margin-top:10px;"><strong>Bakery Products:</strong><ul style="margin:10px 0 0 0; padding:0 0 0 18px;">';
                        order.products.forEach(prod => {
                            const line = `${capitalizeWords(prod.name)} x ${prod.quantity} = Rs.${prod.price} x ${prod.quantity} = Rs.${prod.price * prod.quantity}`;
                            breakdownHtml += `<li>${line}</li>`;
                            productsTotal += prod.price * prod.quantity;
                        });
                        breakdownHtml += '</ul></div>';
                    }
                    document.getElementById('breakdown').innerHTML = breakdownHtml;

                    // Update total bill
                    const totalBill = (parseInt(order.totalAmount) || 0) + productsTotal;
                    document.getElementById('totalAmount').textContent = totalBill;
                } catch (error) {
                    console.error('Error parsing order details:', error);
                    alert('Error displaying order summary.');
                }
            }
        });

        // Function to handle Review All Orders button click
        function reviewAllOrders() {
            window.location.href = 'orders.html';
        }

        // Helper function to capitalize each word (for product names)
        function capitalizeWords(str) {
            return str.replace(/\w\S*/g, function(txt){
                return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
            });
        }
    </script>
</body>
</html>
