<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary - SLIIT Bakery</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .summary-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .summary-box {
            background-color: rgba(139, 69, 19, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .summary-box p {
            margin: 0.8rem 0;
            font-size: 1.1rem;
            color: #5D4037;
        }

        .summary-box .total {
            font-size: 1.4rem;
            font-weight: bold;
            color: #3E2723;
            border-top: 2px solid rgba(139, 69, 19, 0.2);
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .button-group button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <header>
        <h1>SLIIT Bakery</h1>
        <nav>
            <ul>
                <li onclick="window.location.href='index.html'">Products</li>
                <li onclick="window.location.href='custom-cake.html'">Custom Cake</li>
                <li onclick="window.location.href='orders.html'">Orders</li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="summary-container">
            <h2>Order Summary</h2>
            <div class="summary-box">
                <p><strong>Order ID:</strong> <span id="orderId"></span></p>
                <p><strong>Cake Flavor:</strong> <span id="flavor"></span></p>
                <p><strong>Shape:</strong> <span id="shape"></span></p>
                <p><strong>Toppings:</strong> <span id="toppings"></span></p>
                <p><strong>Message:</strong> <span id="message"></span></p>
                <p class="total"><strong>Total Amount:</strong> Rs.<span id="totalAmount"></span></p>
            </div>
            <div class="button-group">
                <button onclick="window.location.href='custom-cake.html'">Place Another Order</button>
                <button onclick="window.location.href='orders.html'">Review All Orders</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get order details from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const orderParam = urlParams.get('order');
            
            if (orderParam) {
                try {
                    const order = JSON.parse(decodeURIComponent(orderParam));
                    
                    // Display order details
                    document.getElementById('orderId').textContent = order.id;
                    document.getElementById('flavor').textContent = order.flavor;
                    document.getElementById('shape').textContent = order.shape;
                    document.getElementById('toppings').textContent = order.toppings;
                    document.getElementById('message').textContent = order.message;
                    document.getElementById('totalAmount').textContent = order.totalAmount;
                } catch (error) {
                    console.error('Error parsing order details:', error);
                    alert('Error displaying order summary. Redirecting to orders page...');
                    window.location.href = 'orders.html';
                }
            } else {
                // If no order details found, redirect to orders page
                window.location.href = 'orders.html';
            }
        });

        // Function to handle Review All Orders button click
        function reviewAllOrders() {
            window.location.href = 'orders.html';
        }
    </script>
</body>
</html>
