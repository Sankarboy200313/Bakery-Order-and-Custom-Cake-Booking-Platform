<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Bakery Platform</title>
  <link rel="stylesheet" href="../static/styles.css">
  <style>
    body {
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .login-container {
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #202840;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 14px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background-color: #202840;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .login-btn:hover {
      background-color: #1a2238;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h2>Admin Login</h2>

  <!-- Error message from backend -->
  <p class="error" th:if="${error}" th:text="${error}"></p>

  <!-- Backend login form -->
  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label for="admin-username">Username</label>
      <input type="text" id="admin-username" name="username" placeholder="Enter username" required>
    </div>
    <div class="form-group">
      <label for="admin-password">Password</label>
      <input type="password" id="admin-password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="login-btn">Login</button>
  </form>
</div>

</body>
</html>
