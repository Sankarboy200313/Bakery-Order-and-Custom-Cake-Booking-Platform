<h1>Bakery User & Admin Management</h1>

<!-- Add User Section -->
<form id="userForm">
    <h2>Add User</h2>
    <input name="userId" placeholder="User ID" required />
    <input name="username" placeholder="Username" required />
    <input name="fullName" placeholder="Full Name" required />
    <input name="email" placeholder="Email" type="email" required />
    <button type="submit">Add User</button>
</form>

<!-- Delete User -->
<div class="section">
    <h2>Delete User</h2>
    <input id="deleteUserId" placeholder="User ID to delete" />
    <button id="deleteUserBtn">Delete User</button>
</div>

<!-- Add Admin Section -->
<form id="adminForm">
    <h2>Add Admin</h2>
    <input name="adminId" placeholder="Admin ID" required />
    <input name="adminUsername" placeholder="Username" required />
    <input name="adminPassword" placeholder="Password" required type="password"/>
    <button type="submit">Add Admin</button>
</form>

<!-- Delete Admin -->
<div class="section">
    <h2>Delete Admin</h2>
    <input id="deleteAdminId" placeholder="Admin ID to delete" />
    <button id="deleteAdminBtn">Delete Admin</button>
</div>

<!-- Admin Table -->
<div class="section">
    <h2>Admin List</h2>
    <table id="adminTable">
        <thead>
        <tr>
            <th>Username</th>
            <th>Password</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="adminTableBody">
        <!-- Populated by JavaScript -->
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const userForm = document.getElementById('userForm');
        const adminForm = document.getElementById('adminForm');
        const adminTableBody = document.getElementById('adminTableBody');

        // Load admins
        fetch('/users')
            .then(res => res.json())
            .then(data => {
                data.forEach(user => {
                    if (user.fullName === 'Admin') {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                <td>${user.username}</td>
                <td>${user.password}</td>
                <td>${user.fullName}</td>
                <td>${user.email}</td>
                <td>
                  <button onclick="editAdmin('${user.username}', '${user.username}', '${user.password}')">Edit</button>
                </td>
              `;
                        adminTableBody.appendChild(row);
                    }
                });
            });

        // Add User
        userForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                action: 'addUser',
                userId: userForm.userId.value,
                username: userForm.username.value,
                fullName: userForm.fullName.value,
                email: userForm.email.value
            };

            fetch('/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => location.reload());
        });

        // Delete User
        document.getElementById('deleteUserBtn').addEventListener('click', () => {
            const userId = document.getElementById('deleteUserId').value;
            fetch(`/users/${userId}`, {
                method: 'DELETE'
            }).then(() => location.reload());
        });

        // Add Admin
        adminForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                action: 'addAdmin',
                adminId: adminForm.adminId.value,
                username: adminForm.adminUsername.value,
                password: adminForm.adminPassword.value
            };

            fetch('/admins', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => location.reload());
        });

        // Delete Admin
        document.getElementById('deleteAdminBtn').addEventListener('click', () => {
            const adminId = document.getElementById('deleteAdminId').value;
            fetch(`/admins/${adminId}`, {
                method: 'DELETE'
            }).then(() => location.reload());
        });
    });

    // Edit Admin
    function editAdmin(adminId, currentUsername, currentPassword) {
        const newUsername = prompt("Enter new username", currentUsername);
        const newPassword = prompt("Enter new password", currentPassword);

        if (newUsername && newPassword) {
            fetch(`/admins/${adminId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: newUsername, password: newPassword })
            }).then(() => location.reload());
        }
    }
</script>
