<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f7f7f7;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form, .section {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            text-align: left;
            padding: 12px;
        }
        th {
            background-color: #f2f2f2;
        }
        .delete-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .edit-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .delete-btn:hover {
            background-color: #ff0000;
        }
        
        .edit-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<header>
    <div class="logosec">
        <div class="logo">Bakers</div>
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210182541/Untitled-design-(30).png"
             class="icn menuicn" id="menuicn" alt="menu-icon" />
    </div>
    <div class="searchbar">
        <input type="text" placeholder="Search" />
        <div class="searchbtn">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180758/Untitled-design-(28).png"
                 class="icn srchicn" alt="search-icon" />
        </div>
    </div>
    <div class="message">
        <div class="circle"></div>
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210183322/8.png" class="icn" alt="" />
        <div class="dp">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180014/profile-removebg-preview.png"
                 class="dpicn" alt="dp" />
        </div>
    </div>
</header>

<div class="main-container">
    <div class="navcontainer">
        <nav class="nav">
            <div class="nav-upper-options">
                <div class="nav-option option1">
                    <img src="https://cdn-icons-png.flaticon.com/512/2718/2718224.png" class="nav-img" alt="bread" />
                    <a href="/"><h3>Dashboard</h3></a>
                </div>
                <div class="nav-option option2">
                    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046794.png" class="nav-img" alt="cupcake" />
                    <a href="/orders-page"><h3>Orders & Report</h3></a>
                </div>
                <div class="nav-option option3">
                    <img src="https://cdn-icons-png.flaticon.com/512/706/706164.png" class="nav-img" alt="chef-hat" />
                    <a href="/users"><h3>Users</h3></a>
                </div>
                <div class="nav-option option4">
                    <img src="https://cdn-icons-png.flaticon.com/512/607/607839.png" class="nav-img" alt="rolling-pin" />
                    <a href="/store"><h3>Store Details</h3></a>
                </div>
                <div class="nav-option logout">
                    <img src="https://cdn-icons-png.flaticon.com/512/2795/2795778.png" class="nav-img" alt="logout" />
                    <a href="/login"><h3>Logout</h3></a>
                </div>
            </div>
        </nav>
    </div>


<h1>Bakery User & Admin Management</h1>

<!-- Add User Section -->
<form id="userForm">
    <h2>Add User</h2>
    <input name="userId" placeholder="User ID" required />
    <input name="username" placeholder="Username" required />
    <input name="fullName" placeholder="Full Name" required />
    <input name="email" placeholder="Email" type="email" required />
    <button type="submit">Add User</button>
</form>

<!-- Delete User -->
<div class="section">
    <h2>Delete User</h2>
    <input id="deleteUserId" placeholder="User ID to delete" />
    <button id="deleteUserBtn">Delete User</button>
</div>

<!-- Admin Table -->
<div class="section">
    <h2>Admin List</h2>
    <table id="adminTable">
        <thead>
        <tr>
            <th>Admin ID</th>
            <th>Username</th>
            <th>Password</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="adminTableBody">
        <!-- Populated by JavaScript -->
        </tbody>
    </table>
</div>

<!-- Add Admin Form -->
<form id="adminForm">
    <h2>Add Admin</h2>
    <input name="adminId" placeholder="Admin ID" required />
    <input name="username" placeholder="Username" required />
    <input name="password" type="password" placeholder="Password" required />
    <button type="submit">Add Admin</button>
</form>

<!-- Users Table -->
<div class="section">
    <h2>Users List</h2>
    <table id="userTable">
        <thead>
        <tr>
            <th>Username</th>
            <th>Full Name</th>
            <th>Email</th>
        </tr>
        </thead>
        <tbody id="userTableBody">
        <!-- Populated by JavaScript -->
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const userForm = document.getElementById('userForm');
        const adminForm = document.getElementById('adminForm');
        const userTableBody = document.getElementById('userTableBody');
        const adminTableBody = document.getElementById('adminTableBody');

        // Load users
        fetch('/api/users')
            .then(res => res.json())
            .then(data => {
                userTableBody.innerHTML = ''; // Clear existing rows
                data.forEach(user => {
                    if (user.fullName !== 'Admin') { // Only show non-admin users
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${user.username}</td>
                            <td>${user.fullName}</td>
                            <td>${user.email}</td>
                            
                        `;
                        userTableBody.appendChild(row);
                    }
                });
            })
            .catch(error => console.error('Error loading users:', error));

        // Load admins
        function loadAdmins() {
            fetch('/api/admins')
                .then(res => res.json())
                .then(data => {
                    adminTableBody.innerHTML = ''; // Clear existing rows
                    data.forEach(admin => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${admin.adminId}</td>
                            <td>${admin.username}</td>
                            <td>${admin.password}</td>
                            <td>
                                <button onclick="editAdmin('${admin.adminId}', '${admin.username}', '${admin.password}')" class="edit-btn">Edit</button>
                                <button onclick="deleteAdmin('${admin.adminId}')" class="delete-btn">Delete</button>
                            </td>
                        `;
                        adminTableBody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error loading admins:', error);
                    alert('Failed to load admin data');
                });
        }

        // Load admins when page loads
        loadAdmins();

        // Add User
        userForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                username: userForm.username.value,
                fullName: userForm.fullName.value,
                email: userForm.email.value
            };

            fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    alert('User added successfully');
                    userForm.reset();
                    location.reload(); // Reload to update the table
                } else {
                    throw new Error('Failed to add user');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to add user');
            });
        });

        // Delete User function
        function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                fetch(`/api/users/${userId}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.ok) {
                        alert('User deleted successfully');
                        location.reload(); // Reload to update the table
                    } else {
                        throw new Error('Failed to delete user');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to delete user');
                });
            }
        }

        // Add Admin
        adminForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                adminId: adminForm.adminId.value,
                username: adminForm.username.value,
                password: adminForm.password.value
            };

            fetch('/api/admins', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to add admin');
                alert('Admin added successfully');
                adminForm.reset();
                loadAdmins(); // Reload the table
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to add admin');
            });
        });

        // Edit Admin function
        function editAdmin(adminId, currentUsername, currentPassword) {
            const newUsername = prompt("Enter new username", currentUsername);
            if (!newUsername) return;

            const newPassword = prompt("Enter new password", currentPassword);
            if (!newPassword) return;

            fetch(`/api/admins/${adminId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: newUsername,
                    password: newPassword
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to update admin');
                alert('Admin updated successfully');
                location.reload();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to update admin');
            });
        }

        // Delete Admin function
        function deleteAdmin(adminId) {
            if (!confirm(`Are you sure you want to delete admin with ID: ${adminId}?`)) return;

            fetch(`/api/admins/${adminId}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to delete admin');
                alert('Admin deleted successfully');
                location.reload();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to delete admin');
            });
        }
    });
</script>

</body>
</html>
