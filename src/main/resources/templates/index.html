<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bakery Admin Platform</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .sortable {
            cursor: pointer;
            user-select: none;
        }
        .sortable:hover {
            background-color: #f0f0f0;
        }
        .sortable::after {
            content: " ⇵";
            font-size: 12px;
            color: #999;
        }
        .sortable.asc::after {
            content: " ↑";
            color: #333;
        }
        .sortable.desc::after {
            content: " ↓";
            color: #333;
        }
        .status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .completed {
            background-color: #d4edda;
            color: #155724;
        }
        .processing {
            background-color: #fff3cd;
            color: #856404;
        }
        .pending {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
<header>
    <div class="logosec">
        <div class="logo">Bakers</div>
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210182541/Untitled-design-(30).png"
             class="icn menuicn" id="menuicn" alt="menu-icon" />
    </div>
    <div class="searchbar">
        <input type="text" placeholder="Search" />
        <div class="searchbtn">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180758/Untitled-design-(28).png"
                 class="icn srchicn" alt="search-icon" />
        </div>
    </div>
    <div class="message">
        <div class="circle"></div>
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210183322/8.png" class="icn" alt="" />
        <div class="dp">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180014/profile-removebg-preview.png"
                 class="dpicn" alt="dp" />
        </div>
    </div>
</header>
<div class="main-container">
    <div class="navcontainer">
        <nav class="nav">
            <div class="nav-upper-options">
                <div class="nav-option option1">
                    <img src="https://cdn-icons-png.flaticon.com/512/2718/2718224.png" class="nav-img" alt="bread" />
                    <a href="/"> <h3>Dashboard</h3></a>
                </div>
                <div class="nav-option option2">
                    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046794.png" class="nav-img" alt="cupcake" />
                    <a href="/orders-page"> <h3>Orders & Report</h3></a>
                </div>
                <div class="nav-option option3">
                    <img src="https://cdn-icons-png.flaticon.com/512/706/706164.png" class="nav-img" alt="chef-hat" />
                    <a href="/users"> <h3>Users</h3></a>
                </div>
                <div class="nav-option option4">
                    <img src="https://cdn-icons-png.flaticon.com/512/607/607839.png" class="nav-img" alt="rolling-pin" />
                    <a href="/store"> <h3>Store Details</h3></a>
                </div>
                <div class="nav-option logout">
                    <img src="https://cdn-icons-png.flaticon.com/512/2795/2795778.png" class="nav-img" alt="oven-mitt" />
                    <h3>Logout</h3>
                </div>
            </div>
        </nav>
    </div>
    <div class="main">
        <div class="searchbar2">
            <input type="text" placeholder="Search" />
            <div class="searchbtn">
                <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180758/Untitled-design-(28).png"
                     class="icn srchicn" alt="search-button" />
            </div>
        </div>
        <div class="box-container">
            <div class="box box1">
                <div class="text">
                    <h2 class="topic-heading" id="userCount">-</h2>
                    <h2 class="topic">Log-in Users</h2>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046796.png" alt="doughnut" />
            </div>
            <div class="box box2">
                <div class="text">
                    <h2 class="topic-heading" id="orderCount">-</h2>
                    <h2 class="topic">Orders</h2>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" alt="cookie" />
            </div>
            <div class="box box3">
                <div class="text">
                    <h2 class="topic-heading" id="commentCount">-</h2>
                    <h2 class="topic">Comments</h2>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046771.png" alt="muffin" />
            </div>
            <div class="box box4">
                <div class="text">
                    <h2 class="topic-heading" id="income">-</h2>
                    <h2 class="topic">Income</h2>
                </div>
                <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png" alt="cake-slice" />
            </div>
        </div>
        <div class="report-item full-width">
            <h3 class="table-title">Recent Orders</h3>
            <div style="margin-bottom: 10px">
                <label for="sortOrder">Sort by: </label>
                <select id="sortOrder" onchange="sortOrders()">
                    <option value="dateDesc">Date (Newest First)</option>
                    <option value="dateAsc">Date (Oldest First)</option>
                    <option value="totalDesc">Total (High to Low)</option>
                    <option value="totalAsc">Total (Low to High)</option>
                </select>
            </div>
            <table class="order-table" id="orderTable">
                <thead>
                <tr>
                    <th class="sortable" data-sort="orderId">Order ID</th>
                    <th class="sortable" data-sort="customer">Customer</th>
                    <th class="sortable" data-sort="date">Date</th>
                    <th class="sortable" data-sort="total">Total</th>
                    <th class="sortable" data-sort="status">Status</th>
                </tr>
                </thead>
                <tbody>
                <!-- Data will be populated dynamically -->
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="/script/script.js"></script>
<script>
    let orders = []; // Global variable to store orders
    let currentSortField = 'date';
    let currentSortDirection = 'desc';

    document.addEventListener("DOMContentLoaded", function() {
        // Get all dashboard data including orders
        fetch('/api/dashboard')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                // Update summary statistics
                document.getElementById('userCount').textContent = data.loginUsers;
                document.getElementById('orderCount').textContent = data.orders;
                document.getElementById('commentCount').textContent = data.comments;
                document.getElementById('income').textContent = data.income;
                
                // Store orders in global variable
                orders = data.recentOrders;
                
                // Display orders sorted by default (date desc)
                sortAndDisplayOrders('date', 'desc');
                
                // Add click event listeners to sortable headers
                document.querySelectorAll('th.sortable').forEach(th => {
                    th.addEventListener('click', () => {
                        const field = th.getAttribute('data-sort');
                        const direction = currentSortField === field && currentSortDirection === 'asc' ? 'desc' : 'asc';
                        sortAndDisplayOrders(field, direction);
                    });
                });
            })
            .catch(error => {
                console.error('Error loading dashboard data:', error);
                alert('Failed to load dashboard data. Please check the console for details.');
            });
    });
    
    function sortAndDisplayOrders(field, direction) {
        // Update current sort state
        currentSortField = field;
        currentSortDirection = direction;
        
        // Update sort indicators on column headers
        document.querySelectorAll('th.sortable').forEach(th => {
            th.classList.remove('asc', 'desc');
            if (th.getAttribute('data-sort') === field) {
                th.classList.add(direction);
            }
        });
        
        // Sort the orders array
        orders.sort((a, b) => {
            let comparison = 0;
            
            // Handle different field types
            if (field === 'orderId') {
                comparison = a.orderId - b.orderId;
            } else if (field === 'customer') {
                comparison = a.customer.localeCompare(b.customer);
            } else if (field === 'date') {
                comparison = new Date(a.date) - new Date(b.date);
            } else if (field === 'total') {
                comparison = a.total - b.total;
            } else if (field === 'status') {
                comparison = a.status.localeCompare(b.status);
            }
            
            // Reverse if descending
            return direction === 'desc' ? -comparison : comparison;
        });
        
        // Display sorted orders
        displayOrders();
    }
    
    function displayOrders() {
        const tbody = document.querySelector("#orderTable tbody");
        tbody.innerHTML = '';
        
        orders.forEach(order => {
            tbody.innerHTML += `
                <tr>
                    <td>${order.orderId}</td>
                    <td>${order.customer}</td>
                    <td>${order.date}</td>
                    <td>$${order.total.toFixed(2)}</td>
                    <td><span class="status ${order.status.toLowerCase()}">${order.status}</span></td>
                </tr>`;
        });
    }
    
    function sortOrders() {
        const sortValue = document.getElementById('sortOrder').value;
        
        switch(sortValue) {
            case 'dateDesc':
                sortAndDisplayOrders('date', 'desc');
                break;
            case 'dateAsc':
                sortAndDisplayOrders('date', 'asc');
                break;
            case 'totalDesc':
                sortAndDisplayOrders('total', 'desc');
                break;
            case 'totalAsc':
                sortAndDisplayOrders('total', 'asc');
                break;
        }
    }
</script>
</body>
</html>
