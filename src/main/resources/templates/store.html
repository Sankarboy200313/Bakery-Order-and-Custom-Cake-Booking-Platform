<!DOCTYPE html>
<html>
<head>
    <title>Bakery Admin Platform</title>
    <link rel="stylesheet" href="/static/css/store.css">
</head>
<body>

<header>
    <div class="logosec">
        <div class="logo">Bakers</div>
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210182541/Untitled-design-(30).png"
             class="icn menuicn" id="menuicn" alt="menu-icon" />
    </div>
    <div class="searchbar">
        <input type="text" placeholder="Search" />
        <div class="searchbtn">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180758/Untitled-design-(28).png"
                 class="icn srchicn" alt="search-icon" />
        </div>
    </div>

    <div class="message">
        <div class="circle"></div>
        <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210183322/8.png" class="icn" alt="" />
        <div class="dp">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20221210180014/profile-removebg-preview.png"
                 class="dpicn" alt="dp" />
        </div>
    </div>
</header>

<div class="main-container">
    <div class="navcontainer">
        <nav class="nav">
            <div class="nav-upper-options">
                <div class="nav-option option1">
                    <img src="https://cdn-icons-png.flaticon.com/512/2718/2718224.png" class="nav-img" alt="bread" />
                    <a href="index.html"> <h3>Dashboard</h3></a>
                </div>
                <div class="nav-option option2">
                    <img src="https://cdn-icons-png.flaticon.com/512/1046/1046794.png" class="nav-img" alt="cupcake" />
                    <a href="ordersandreport.html"> <h3>Orders & Report</h3></a>
                </div>
                <div class="nav-option option3">
                    <img src="https://cdn-icons-png.flaticon.com/512/706/706164.png" class="nav-img" alt="chef-hat" />
                    <a href="UserManagement.html"> <h3>Users</h3></a>
                </div>
                <div class="nav-option option4">
                    <img src="https://cdn-icons-png.flaticon.com/512/607/607839.png" class="nav-img" alt="rolling-pin" />
                    <a href="Storedetails.html"> <h3>Store Details</h3></a>
                </div>
                <div class="nav-option logout">
                    <img src="https://cdn-icons-png.flaticon.com/512/2795/2795778.png" class="nav-img" alt="oven-mitt" />
                    <h3>Logout</h3>
                </div>
            </div>
        </nav>
    </div>
    <div class="main">
        <div class="store-details">
            <h1>Store Details</h1>

            <div class="product-section">
                <h2>Bakery Products</h2>
                <p id="bakery-stock-count" class="stock-count"></p>
                <ul id="bakery-stock-list" class="stock-list"></ul>

                <input type="text" id="bakery-product-id" placeholder="Product ID" />
                <input type="text" id="bakery-product-name" placeholder="Product Name" />
                <input type="text" id="bakery-product-price" placeholder="Price" />
                <button onclick="addProduct('bakery')">Add Bakery Product</button>

                <input type="text" id="remove-bakery-product-id" placeholder="Remove Product ID" />
                <button onclick="removeProduct('bakery')">Remove Bakery Product</button>
            </div>

            <div class="product-section">
                <h2>Cake Products</h2>
                <p id="cake-stock-count" class="stock-count"></p>
                <ul id="cake-stock-list" class="stock-list"></ul>

                <input type="text" id="cake-product-id" placeholder="Product ID" />
                <input type="text" id="cake-product-name" placeholder="Product Name" />
                <input type="text" id="cake-product-price" placeholder="Price" />
                <button onclick="addProduct('cake')">Add Cake Product</button>

                <input type="text" id="remove-cake-product-id" placeholder="Remove Product ID" />
                <button onclick="removeProduct('cake')">Remove Cake Product</button>
            </div>
        </div>

        <div class="bakery-stock-section">
            <h2>Current Cake Products Available</h2>
            <table class="stock-table">
                <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Product Name</th>
                    <th>Price</th>
                </tr>
                </thead>
                <tbody id="cake-products-table">
                <!-- Cake product rows will be loaded from product.txt -->
                </tbody>
            </table>
        </div>

        <div class="bakery-stock-section">
            <h2>Current Bakery Products Available</h2>
            <table class="stock-table">
                <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Product Name</th>
                    <th>Price</th>
                </tr>
                </thead>
                <tbody id="bakery-products-table">
                <!-- Bakery product rows will be loaded from product.txt -->
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="/static/script/script.js"></script>
</body>
</html>
